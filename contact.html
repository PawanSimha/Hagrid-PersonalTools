    <style>
        :root {
            --google-blue: #1a73e8;
            --google-gray: #5f6368;
            --google-border: #dadce0;
        }

        .contact-container {
            max-width: 700px;
            margin: 5.5rem auto;
            padding: 2.5rem 3.5rem;
            background: var(--bg-primary);
            border: 1px solid var(--google-border);
            border-radius: 28px;
            /* Extra smooth corners */
            box-shadow: 0 1px 3px rgba(60, 64, 67, .3), 0 4px 8px 3px rgba(60, 64, 67, .15);
            transition: transform 0.3s ease;
        }

        .contact-container:hover {
            transform: translateY(-4px);
        }

        .contact-container h1 {
            font-family: 'Google Sans', 'Inter', sans-serif;
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
            text-align: center;
            font-weight: 400;
        }

        .contact-container p {
            margin-bottom: 2.5rem;
            color: var(--google-gray);
            text-align: center;
            font-size: 0.95rem;
        }

        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 1.75rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            font-weight: 500;
            font-size: 0.85rem;
            color: var(--google-gray);
            margin-left: 0.5rem;
        }

        .form-group input,
        .form-group textarea {
            padding: 1rem 1.25rem;
            border: 1px solid var(--google-border);
            border-radius: 12px;
            background: transparent;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--google-blue);
            box-shadow: 0 0 0 2px rgba(26, 115, 232, 0.2);
        }

        .form-group textarea {
            height: 80px;
            resize: vertical;
        }

        .submit-btn {
            background: var(--google-blue);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 24px;
            font-weight: 500;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s, box-shadow 0.2s;
            width: 100%;
            margin-top: 1.5rem;
        }

        .submit-btn:hover {
            background: #185abc;
            box-shadow: 0 1px 3px 1px rgba(66, 133, 244, .15), 0 1px 2px 0 rgba(66, 133, 244, .3);
        }

        #formStatus {
            margin-top: 1.5rem;
            text-align: center;
            font-weight: 500;
            padding: 1rem;
            border-radius: 12px;
            display: none;
            font-size: 0.9rem;
        }

        #formStatus.success {
            display: block;
            background: #e6f4ea;
            color: #137333;
            border: 1px solid #ceead6;
        }

        #formStatus.error {
            display: block;
            background: #fce8e6;
            color: #c5221f;
            border: 1px solid #fad2cf;
        }
    </style>
</head>

<body class="homepage">
    <nav class="top-nav">
        <a href="index.html" class="nav-brand">
            <img src="images/logo.png" alt="Hagrid Logo">
            <span>Hagrid</span>
        </a>
        <div class="nav-links-right">
            <a href="index.html" class="nav-link">Home</a>
            <a href="index.html#tools" class="nav-link">Tools</a>
        </div>
    </nav>

    <main class="contact-container">
        <h1>Contact Me</h1>
        <p>Your feedback helps make Hagrid better. Send me a message and I'll get back to you soon!</p>

        <form id="contactForm" action="https://formspree.io/f/xvgzlowz" method="POST" class="contact-form">
            <div class="form-group">
                <label for="email">Your Email</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label for="subject">Subject</label>
                <input type="text" id="subject" name="subject" placeholder="What is this about?" required>
            </div>
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" placeholder="Type your content here..." required></textarea>
            </div>
            <!-- Formspree attribute for direct email -->
            <input type="hidden" name="_to" value="iampawansimha.2004@gmail.com">

            <button type="submit" class="submit-btn" id="submitBtn">Send Message</button>
        </form>
        <div id="formStatus"></div>
    </main>

    <footer class="site-footer">
        <div class="footer-links">
            <a href="privacy-policy.html">Privacy Policy</a>
            <a href="contact.html">Contact</a>
            <a href="https://x.com/iampawansimha" target="_blank">Twitter</a>
            <a href="https://github.com/PawanSimha" target="_blank">GitHub</a>
            <a href="https://www.linkedin.com/in/pawansimha/" target="_blank">LinkedIn</a>
        </div>
        <div class="footer-copy">
            <span>&copy; 2026 Hagrid</span>
            <span class="footer-separator">•</span>
            <span>Simple. Private. Powerful.</span>
            <span class="footer-separator">•</span>
            <span>by <strong>Pawan Simha R</strong></span>
        </div>
    </footer>

    <script src="global.js"></script>
    <script>
        const form = document.getElementById('contactForm');
        const status = document.getElementById('formStatus');
        const btn = document.getElementById('submitBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            btn.disabled = true;
            btn.textContent = 'Sending...';

            const formData = new FormData(form);
            try {
                const response = await fetch(form.action, {
                    method: 'POST',
                    body: formData,
                    headers: { 'Accept': 'application/json' }
                });

                if (response.ok) {
                    status.textContent = 'Thank you! Your email has been sent successfully.';
                    status.className = 'success';
                    form.reset();
                } else {
                    throw new Error();
                }
            } catch (err) {
                status.textContent = 'Oops! There was a problem sending your message. Please try again or reach out on social media.';
                status.className = 'error';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Send Message';
            }
        });
    </script>
