    <meta name="description"
        content="Convert photos into artistic pencil drawings using AI filters. Creative, fast, and 100% private.">
    <meta property="og:title" content="Pencil Sketch Filter | Hagrid">
    <meta property="og:description"
        content="Turn your photos into hand-drawn sketches instantly. AI-powered art filters for your images.">
    <meta property="og:image" content="../images/logo.png">
    <meta property="og:url" content="https://hagrid.tools/Pencil-Sketch/index.html">
    <meta name="keywords" content="pencil sketch, photo to sketch, image to drawing, pencil effect, sketch filter, photo to pencil drawing, Pawan Simha R, hagrid">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:site" content="@iampawansimha">
    <meta name="twitter:creator" content="@iampawansimha">

    <meta name="OAI-SearchBot" content="index, follow">
    <meta name="Google-Extended" content="index, follow">
    <meta name="PerplexityBot" content="index, follow">
    <meta name="ChatGPT-User" content="index, follow">
    <meta name="theme-color" content="#212121">
    <title>Pencil Sketch Filter | Hagrid</title>
    <link rel="icon" type="image/png" href="../images/logo.png">
    <link rel="manifest" href="../manifest.json">
    <link rel="stylesheet" href="../style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>
    <nav class="top-nav" aria-label="Main Navigation">
        <a href="../index.html" class="nav-brand" aria-label="Hagrid Home">
            <img src="../images/logo.png" alt="Hagrid Logo">
            <span>Hagrid</span>
        </a>
        <div class="nav-links-right">
            <a href="../index.html" class="nav-link">Home</a>
            <a href="../index.html#tools" class="nav-link">Tools</a>
            <button class="theme-toggle" id="themeToggle" title="Toggle Dark Mode" aria-label="Toggle Dark Mode">
                <span class="toggle-icon sun-icon">☀︎</span>
                <span class="toggle-icon moon-icon">☾</span>
            </button>
        </div>
    </nav>

    <main class="tool-page">
        <section class="tool-workspace">
            <div class="canvas-container" style="flex-direction: column; gap: 2rem;">
                <div id="loadingOverlay"
                    style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); z-index: 10; align-items: center; justify-content: center; flex-direction: column; gap: 1rem;">
                    <div class="spinner"
                        style="width: 40px; height: 40px; border: 4px solid var(--border-color); border-top-color: var(--primary-color); border-radius: 50%; animation: spin 1s linear infinite;">
                    </div>
                    <p style="font-weight: 600; color: var(--text-primary);">Processing Sketch...</p>
                </div>

                <div id="previewContainer"
                    style="display: flex; gap: 2rem; flex-wrap: wrap; justify-content: center; width: 100%;">
                    <div style="text-align: center;">
                        <img id="imageBefore"
                            style="max-width: 350px; max-height: 350px; border-radius: var(--radius-md); box-shadow: var(--shadow-sm); display: none;"
                            alt="Original preview">
                    </div>
                    <div style="text-align: center;">
                        <img id="imageAfter"
                            style="max-width: 350px; max-height: 350px; border-radius: var(--radius-md); box-shadow: var(--shadow-sm); display: none;"
                            alt="Sketch preview">
                    </div>
                </div>
                <p id="uploadPrompt" style="color: var(--text-secondary);">Upload an image to apply the pencil sketch
                    effect</p>
            </div>
        </section>

        <aside class="tool-sidebar">
            <div class="sidebar-header">
                <h2>Pencil Sketch</h2>
                <p>Convert your photos into professional pencil drawings using AI-aligned computer vision.</p>
            </div>

            <div class="control-group">
                <label>Upload Image</label>
                <div class="drop-zone" id="dropZone">
                    <span class="drop-icon">✏️</span>
                    <p>Drag and drop image or click to upload</p>
                    <input type="file" id="fileInput" accept="image/*" />
                </div>
            </div>

            <div class="control-group">
                <label>Sketch Intensity <span class="control-value" id="intensityValue">50</span>%</label>
                <input type="range" id="intensityInput" min="1" max="100" value="50">
                <p style="font-size: 0.75rem; color: var(--text-secondary);">Higher intensity creates a more detailed
                    sketch.</p>
            </div>

            <div class="tool-actions" style="margin-top: 2rem; display: flex; flex-direction: column; gap: 1rem;">
                <button id="processBtn" class="btn-primary" disabled style="width: 100%;">Apply Sketch</button>
                <button id="downloadBtn" class="btn-primary" style="display: none; width: 100%;">Download
                    Result</button>
            </div>
        </aside>
    </main>

    <style>
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>

    <script src="../global.js"></script>
    <script src="script.js"></script>
</body>

</html>
