  <meta charset="UTF-8" />

  <meta name="description"
    content="Round corners and resize images for perfect UI elements. Fast and easy CSS-ready preview for developers.">
  <meta property="og:title" content="Border Radius Cropper | Hagrid">
  <meta property="og:description"
    content="Create perfect rounded-corner images for your UI. Live preview and instant download.">
  <meta property="og:image" content="../images/logo.png">
  <meta property="og:url" content="https://hagrid.tools/Border-Radius/index.html">
  <meta name="keywords" content="border radius, rounded corners, image cropper, corner radius, image editor, round corners image, Pawan Simha R, hagrid">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:site" content="@iampawansimha">
  <meta name="twitter:creator" content="@iampawansimha">
  <meta name="twitter:image" content="../images/logo.png">
  <meta name="twitter:image:alt" content="Hagrid logo">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Hagrid">
  <meta property="og:locale" content="en_US">
  <meta property="og:image:width" content="512">
  <meta property="og:image:height" content="512">
  <meta property="og:image:alt" content="Hagrid logo">
  <meta name="robots" content="index, follow">
  <meta name="googlebot" content="index, follow, max-video-preview:-1, max-image-preview:large">

  <meta name="Google-Extended" content="index, follow">
  <meta name="PerplexityBot" content="index, follow">
  <meta name="ChatGPT-User" content="index, follow">
  <meta name="theme-color" content="#212121">
  <title>Border Radius Cropper | Hagrid</title>
  <link rel="icon" type="image/png" href="../images/logo.png">
  <link rel="manifest" href="../manifest.json">
  <link rel="stylesheet" href="../style.css" />
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>
  <nav class="top-nav" aria-label="Main Navigation">
    <a href="../index.html" class="nav-brand" aria-label="Hagrid Home">
      <img src="../images/logo.png" alt="Hagrid Logo">
      <span>Hagrid</span>
    </a>
    <div class="nav-links-right">
      <a href="../index.html" class="nav-link">Home</a>
      <a href="../index.html#tools" class="nav-link">Tools</a>
      <button class="theme-toggle" id="themeToggle" title="Toggle Dark Mode" aria-label="Toggle Dark Mode">
        <span class="toggle-icon sun-icon">☀︎</span>
        <span class="toggle-icon moon-icon">☾</span>
      </button>
    </div>
  </nav>

  <main class="tool-page">
    <section class="tool-workspace">
      <div class="canvas-container checkerboard" id="canvasWrapper">
        <canvas id="canvas"></canvas>
      </div>
    </section>

    <aside class="tool-sidebar">
      <div class="sidebar-header">
        <h2>Border Radius Cropper</h2>
        <p>Round corners and resize images</p>
      </div>

      <div class="control-group">
        <label>Upload Image</label>
        <div class="drop-zone" id="dropZone">
          <span class="drop-icon">📁</span>
          <p>Drag and drop image or upload image</p>
          <input type="file" id="imageInput" accept="image/*" />
        </div>
      </div>

      <div class="control-group">
        <label>Dimensions (px)</label>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem;">
          <input type="number" id="widthInput" value="300" placeholder="Width">
          <input type="number" id="heightInput" value="300" placeholder="Height">
        </div>
      </div>

      <div class="control-group">
        <label>Unit</label>
        <select id="unitSelect">
          <option value="px">Pixels</option>
          <option value="mm">Millimeters</option>
          <option value="cm">Centimeters</option>
        </select>
      </div>

      <div class="control-group">
        <label>Border Radius <span class="control-value" id="radiusValue">0</span>px</label>
        <input type="range" id="radiusInput" min="0" max="150" value="0">
      </div>

      <div class="control-group">
        <label>Fit Mode</label>
        <select id="fitSelect">
          <option value="fill">Fill (Stretch)</option>
          <option value="cover">Cover</option>
          <option value="contain">Contain</option>
        </select>
      </div>

      <div class="control-group">
        <label>Zoom <span class="control-value" id="zoomValue">1.0</span>x</label>
        <input type="range" id="zoomInput" min="0.1" max="5" step="0.1" value="1">
      </div>

      <div class="control-group">
        <label>Background Color</label>
        <input type="color" id="bgColorInput" value="#ffffff"
          style="width: 100%; padding: 0.1rem; border: 1px solid var(--border-color); cursor: pointer;">
      </div>

      <div class="control-group">
        <label>Positioning (X: <span class="control-value" id="offsetXValue">0</span>px / Y: <span class="control-value"
            id="offsetYValue">0</span>px)</label>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem;">
          <input type="range" id="offsetXInput" min="-200" max="200" value="0">
          <input type="range" id="offsetYInput" min="-200" max="200" value="0">
        </div>
      </div>

      <div class="advanced-toggle" id="advancedToggle">Advanced Options</div>
      <div class="advanced-content" id="advancedContent">
        <div class="control-group">
          <label>Transformations</label>
          <div class="btn-group">
            <button class="btn-outline" id="flipHBtn">Flip H</button>
            <button class="btn-outline" id="flipVBtn">Flip V</button>
            <button class="btn-outline" id="rotate90Btn">Rotate 90°</button>
          </div>
        </div>

        <div class="control-group">
          <label>Rotation <span class="control-value" id="rotateValue">0</span>°</label>
          <input type="range" id="rotateInput" min="0" max="360" value="0">
        </div>

        <div class="control-group">
          <label>Brightness <span class="control-value" id="brightnessValue">100</span>%</label>
          <input type="range" id="brightnessInput" min="0" max="200" value="100">
        </div>

        <div class="control-group">
          <label>Contrast <span class="control-value" id="contrastValue">100</span>%</label>
          <input type="range" id="contrastInput" min="0" max="200" value="100">
        </div>

        <div class="control-group">
          <label>Shadow Blur <span class="control-value" id="shadowValue">0</span>px</label>
          <input type="range" id="shadowInput" min="0" max="50" value="0">
        </div>

        <div class="control-group">
          <label>
            Transparency Grid
            <input type="checkbox" id="checkerboardToggle" checked>
          </label>
        </div>
      </div>

      <button id="downloadBtn" class="btn-primary" style="margin-top: 1rem;">Download Image</button>
    </aside>
  </main>

  <script src="script.js"></script>
  <script src="../global.js"></script>
</body>

</html>
