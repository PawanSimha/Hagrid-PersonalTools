<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Pawan Simha R">
    <link rel="canonical" href="https://hagrid.tools/QR-Generator/index.html">
    <meta name="description"
        content="Custom QR code generator with logo support and color customization. Fast, reliable, and private.">
    <meta property="og:title" content="QR Generator | Hagrid">
    <meta property="og:description"
        content="Create professional QR codes with your logo. Fully customizable colors and error correction.">
    <meta property="og:image" content="../images/logo.png">
    <meta property="og:url" content="https://hagrid.tools/QR-Generator/index.html">
    <meta name="keywords" content="qr code generator, create qr code, custom qr code, qr code maker, qr code for url, free qr code, Pawan Simha R, hagrid">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:site" content="@iampawansimha">
    <meta name="twitter:creator" content="@iampawansimha">
    <meta name="twitter:image" content="../images/logo.png">
    <meta name="twitter:image:alt" content="Hagrid logo">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Hagrid">
    <meta property="og:locale" content="en_US">
    <meta property="og:image:width" content="512">
    <meta property="og:image:height" content="512">
    <meta property="og:image:alt" content="Hagrid logo">
    <meta name="robots" content="index, follow">
    <meta name="googlebot" content="index, follow, max-video-preview:-1, max-image-preview:large">
    <meta name="OAI-SearchBot" content="index, follow">
    <meta name="Google-Extended" content="index, follow">
    <meta name="PerplexityBot" content="index, follow">
    <meta name="ChatGPT-User" content="index, follow">
    <meta name="theme-color" content="#212121">
    <title>QR Generator | Hagrid</title>
    <link rel="icon" type="image/png" href="../images/logo.png">
    <link rel="manifest" href="../manifest.json">
    <link rel="stylesheet" href="../style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js" integrity="sha384-HGmnkDZJy7mRkoARekrrj0VjEFSh9a0Z8qxGri/kTTAJkgR8hqD1lHsYSh3JdzRi" crossorigin="anonymous"></script>
</head>

<body>
    <nav class="top-nav" aria-label="Main Navigation">
        <a href="../index.html" class="nav-brand" aria-label="Hagrid Home">
            <img src="../images/logo.png" alt="Hagrid Logo">
            <span>Hagrid</span>
        </a>
        <div class="nav-links-right">
            <a href="../index.html" class="nav-link">Home</a>
            <a href="../index.html#tools" class="nav-link">Tools</a>
            <button class="theme-toggle" id="themeToggle" title="Toggle Dark Mode" aria-label="Toggle Dark Mode">
                <span class="toggle-icon sun-icon">☀︎</span>
                <span class="toggle-icon moon-icon">☾</span>
            </button>
        </div>
    </nav>

    <main class="tool-page">
        <section class="tool-workspace">
            <div class="canvas-container"
                style="display: flex; flex-direction: column; align-items: center; justify-content: center;">
                <div
                    style="width: 300px; height: 300px; background: #fff; border-radius: var(--radius-md); box-shadow: var(--shadow-sm); display: flex; align-items: center; justify-content: center; padding: 1rem;">
                    <canvas id="qrCanvas" style="max-width: 100%; max-height: 100%; height: auto;"></canvas>
                </div>
                <p id="qrPrompt" style="color: var(--text-secondary); margin-top: 1rem;">QR code will update
                    automatically as you type</p>
            </div>
        </section>

        <aside class="tool-sidebar">
            <div class="sidebar-header">
                <h2>QR Generator</h2>
                <p>Create custom QR codes instantly</p>
            </div>

            <div class="control-group">
                <label>Text or URL</label>
                <textarea id="qrInput" placeholder="Enter text or URL"
                    style="width: 100%; height: 100px; border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 0.5rem; font-family: inherit; font-size: 0.9rem; resize: none; outline: none;"></textarea>
            </div>

            <div class="control-group">
                <label>Foreground Color</label>
                <input type="color" id="fgColor" value="#000000"
                    style="width: 100%; height: 36px; border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 2px;">
            </div>

            <div class="control-group">
                <label>Background Color</label>
                <input type="color" id="bgColor" value="#ffffff"
                    style="width: 100%; height: 36px; border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 2px;">
            </div>

            <div class="control-group">
                <label>Margin <span class="control-value" id="marginValue">2</span></label>
                <input type="range" id="qrMargin" min="0" max="20" value="2">
            </div>

            <div class="control-group">
                <label>Error Correction</label>
                <select id="qrECC">
                    <option value="L">L - Low (7%)</option>
                    <option value="M">M - Medium (15%)</option>
                    <option value="Q">Q - Quartile (25%)</option>
                    <option value="H" selected>H - High (30%)</option>
                </select>
            </div>

            <div class="control-group">
                <label>Add Logo (Optional)</label>
                <div class="drop-zone" id="logoDropZone" style="padding: 1rem;">
                    <span style="font-size: 1.2rem;">🖼️</span>
                    <p style="font-size: 0.8rem;">Drop logo or click</p>
                    <input type="file" id="logoInput" accept="image/*" />
                </div>
                <button id="clearLogoBtn" class="btn-primary"
                    style="background: var(--bg-secondary); color: var(--text-primary); border: 1px solid var(--border-color); margin-top: 0.5rem; display: none;">Remove
                    Logo</button>
            </div>

            <button id="downloadBtn" class="btn-primary" style="margin-top: 1rem;">Download QR PNG</button>
        </aside>
    </main>

    <script src="script.js"></script>
    <script src="../global.js"></script>
</body>

</html>
