<!DOCTYPE html>
<!-- Author: Pawan Simha -->
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Pawan Simha">
    <link rel="canonical" href="https://hagrid.tools/Image-to-PDF/index.html">
    <meta name="description"
        content="Combine multiple images into a single high-quality PDF document. 100% private and browser-based.">
    <meta property="og:title" content="Image to PDF | Hagrid">
    <meta property="og:description"
        content="Convert your photos and scanned documents to PDF instantly. High-quality output with no server uploads.">
    <meta property="og:image" content="../images/logo.png">
    <meta property="og:url" content="https://hagrid.tools/Image-to-PDF/index.html">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="theme-color" content="#212121">
    <title>Image to PDF | Hagrid</title>
    <link rel="icon" type="image/png" href="../images/logo.png">
    <link rel="manifest" href="../manifest.json">
    <link rel="stylesheet" href="../style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>
    <nav class="top-nav" aria-label="Main Navigation">
        <a href="../index.html" class="nav-brand" aria-label="Hagrid Home">
            <img src="../images/logo.png" alt="Hagrid Logo">
            <span>Hagrid</span>
        </a>
        <div class="nav-links-right">
            <a href="../index.html" class="nav-link">Home</a>
            <a href="../index.html#tools" class="nav-link">Tools</a>
            <button class="theme-toggle" id="themeToggle" title="Toggle Dark Mode" aria-label="Toggle Dark Mode">
                <span class="toggle-icon sun-icon">☀︎</span>
                <span class="toggle-icon moon-icon">☾</span>
            </button>
        </div>
    </nav>

    <main class="tool-page">
        <section class="tool-workspace">
            <div class="canvas-container" style="flex-direction: column; gap: 1rem; width: 100%; max-width: 800px;">
                <div id="loadingOverlay"
                    style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); z-index: 10; align-items: center; justify-content: center; flex-direction: column; gap: 1rem;">
                    <div class="spinner"
                        style="width: 40px; height: 40px; border: 4px solid var(--border-color); border-top-color: var(--primary-color); border-radius: 50%; animation: spin 1s linear infinite;">
                    </div>
                    <p style="font-weight: 600; color: var(--text-primary);">Generating PDF...</p>
                </div>

                <div id="fileListContainer" style="width: 100%; display: none;">
                    <h3 style="font-size: 0.9rem; margin-bottom: 1rem; color: var(--text-primary);">Files to be
                        converted:</h3>
                    <div id="fileList"
                        style="display: flex; flex-direction: column; gap: 0.5rem; max-height: 400px; overflow-y: auto; padding: 0.5rem; border: 1px solid var(--border-color); border-radius: var(--radius-md); background: var(--bg-main);">
                        <!-- Files will be injected here -->
                    </div>
                </div>

                <p id="uploadPrompt" style="color: var(--text-secondary);">Upload images to convert into a single PDF
                </p>
            </div>
        </section>

        <aside class="tool-sidebar">
            <div class="sidebar-header">
                <h2>Image to PDF</h2>
                <p>Convert multiple images (JPG, PNG) into a single PDF document. Perfect for certificates and
                    documents.</p>
            </div>

            <div class="control-group">
                <label>Add Images (Bulk)</label>
                <div class="drop-zone" id="dropZone">
                    <span class="drop-icon">📁</span>
                    <p>Drag and drop images or click to upload</p>
                    <input type="file" id="fileInput" accept="image/jpeg, image/png" multiple />
                </div>
            </div>

            <div id="fileStats" style="font-size: 0.8rem; color: var(--text-secondary); display: none;">
                <span id="fileCount">0</span> images selected.
            </div>

            <div class="tool-actions" style="margin-top: 2rem; display: flex; flex-direction: column; gap: 1rem;">
                <button id="processBtn" class="btn-primary" disabled style="width: 100%;">Create PDF</button>
                <button id="clearAllBtn" class="btn-outline" style="width: 100%; display: none;">Clear All</button>
            </div>
        </aside>
    </main>

    <style>
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem;
            background: var(--bg-secondary);
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
        }

        .file-info {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.85rem;
            color: var(--text-primary);
        }

        .file-info img {
            width: 32px;
            height: 32px;
            object-fit: cover;
            border-radius: 4px;
        }

        .remove-file {
            color: var(--text-secondary);
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1rem;
            transition: color 0.2s;
        }

        .remove-file:hover {
            color: #d93025;
        }
    </style>

    <script src="../global.js"></script>
    <script src="script.js"></script>
</body>

</html>
